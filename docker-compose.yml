services:

  # ---------------------------------------------------------------------------
  # TimescaleDB — time-series storage for market ticks and macro regimes
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: aleph_one_timescale
    environment:
      POSTGRES_USER: ${DB_USER:-aleph_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aleph_secure_pass}
      POSTGRES_DB: ${DB_NAME:-aleph_core}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aleph_admin} -d ${DB_NAME:-aleph_core}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Milvus — vector database for Phase 4 RAG / embedding search
  # ---------------------------------------------------------------------------
  milvus-standalone:
    image: milvusdb/milvus:v2.3.0
    container_name: aleph_one_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      MINIO_USE_EMBED: "true"
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus/data

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store for raw data artefacts
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # API — FastAPI application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${DB_USER:-aleph_admin}:${DB_PASSWORD:-aleph_secure_pass}@timescaledb:5432/${DB_NAME:-aleph_core}
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-aleph_core}
      DB_USER: ${DB_USER:-aleph_admin}
      DB_PASSWORD: ${DB_PASSWORD:-aleph_secure_pass}
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Aleph-API — SSE intelligence stream + OMNI command terminal (src/main.py)
  # Internal port 8001; not exposed to host — consumed by the frontend proxy.
  # ---------------------------------------------------------------------------
  aleph-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["uv", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${DB_USER:-aleph_admin}:${DB_PASSWORD:-aleph_secure_pass}@timescaledb:5432/${DB_NAME:-aleph_core}
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-aleph_core}
      DB_USER: ${DB_USER:-aleph_admin}
      DB_PASSWORD: ${DB_PASSWORD:-aleph_secure_pass}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend — Next.js app (Aleph-One UI)
  # UI → http://localhost:3000
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://api:8000
      ALEPH_API_URL: http://aleph-api:8001
    depends_on:
      api:
        condition: service_healthy
      aleph-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection and alerting
  # Scrapes the API /metrics endpoint every 15 s.
  # UI → http://localhost:9090
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/alerts/prometheus_rules.yml:/etc/prometheus/rules/prometheus_rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Grafana — metrics dashboards
  # Default credentials: admin / admin (change on first login)
  # UI → http://localhost:3000
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"  # 3000 is used by the frontend (Next.js)
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescale_data:
  milvus_data:
  minio_data:
  prometheus_data:
  grafana_data: