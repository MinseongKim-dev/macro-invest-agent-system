name: Backend CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "apps/api/**"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.prod.yml"

concurrency:
  group: backend-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/aleph-api
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/aleph-api:buildcache
          cache-to:   type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/aleph-api:buildcache,mode=max

  deploy:
    name: Rolling deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    # Set repo variable DEPLOY_ENABLED=true once VPS is ready
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH || '/opt/aleph-one' }}
            git fetch origin main
            git reset --hard origin/main
            export IMAGE_TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)
            export DOCKER_IMAGE=${{ vars.DOCKERHUB_USERNAME }}/aleph-api
            docker compose -f docker-compose.prod.yml pull aleph-api
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # Prune dangling images, stopped containers, unused networks, and
            # build cache — but NOT named volumes (pg_data / milvus_data are safe).
            docker system prune -f
            echo "Deploy complete: $IMAGE_TAG"

            # Health-check gate: fail the deployment if /health never returns 200
            # Catches crash-looping containers that docker compose up -d would miss.
            echo "Waiting for /health to return 200..."
            for i in $(seq 1 15); do
              status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/health || echo "000")
              if [ "$status" = "200" ]; then
                echo "Health check passed (attempt $i)"
                break
              fi
              echo "Attempt $i: status=$status, retrying in 4s..."
              sleep 4
              if [ "$i" = "15" ]; then
                echo "Health check failed after 60 s — rolling back"
                docker compose -f docker-compose.prod.yml rollout aleph-api 2>/dev/null || true
                exit 1
              fi
            done
