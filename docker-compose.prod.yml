# Production stack — FastAPI (aleph-api) + TimescaleDB only.
# Milvus runs as embedded Lite (file-based), no separate container needed.
# Frontend is deployed to Vercel and not included here.
#
# Required .env variables:
#   DOCKER_IMAGE      — Docker Hub image (e.g. yourname/aleph-api)
#   IMAGE_TAG         — image tag (default: latest)
#   GROQ_API_KEY      — required for LLM features
#   POSTGRES_PASSWORD — auto-generated by vps-setup.sh
#   CORS_ALLOWED_ORIGINS — e.g. https://macro-invest-agent-system.vercel.app
#   FRED_API_KEY      — optional, for FRED macro data

services:
  aleph-api:
    image: ${DOCKER_IMAGE}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      ENV_MODE:             "PRODUCTION"
      GROQ_API_KEY:         ${GROQ_API_KEY}
      GROQ_MODEL:           ${GROQ_MODEL:-llama3-70b-8192}
      FRED_API_KEY:         ${FRED_API_KEY:-}
      # DB connection — must match the timescaledb service below
      DB_HOST:              timescaledb
      DB_PORT:              "5432"
      DB_NAME:              aleph
      DB_USER:              aleph
      DB_PASSWORD:          ${POSTGRES_PASSWORD}
      MILVUS_LITE_PATH:     "/data/milvus_lite.db"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - milvus_data:/data
    depends_on:
      timescaledb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 800m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER:     aleph
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       aleph
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 800m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aleph -d aleph"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pg_data:
  milvus_data:
